name: Update Database Connection Strings

on:
  workflow_dispatch:
    inputs:
      new_connection_string:
        description: 'New Prisma Accelerate connection string'
        required: true
        type: string
      environment:
        description: 'Update which environments'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - github-only
          - vercel-only

jobs:
  validate:
    name: Validate Connection String
    runs-on: ubuntu-latest
    steps:
      - name: Validate format
        env:
          CONNECTION_STRING: ${{ inputs.new_connection_string }}
        run: |
          if [[ ! "$CONNECTION_STRING" =~ ^prisma\+postgres://accelerate\.prisma-data\.net/\?api_key= ]]; then
            echo "::error::Invalid connection string format"
            exit 1
          fi
          echo "✅ Connection string format validated"

  update-github-secrets:
    name: Update GitHub Secrets
    runs-on: ubuntu-latest
    needs: validate
    if: inputs.environment == 'all' || inputs.environment == 'github-only'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update DATABASE_URL
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CONNECTION_STRING: ${{ inputs.new_connection_string }}
        run: gh secret set DATABASE_URL --body "$CONNECTION_STRING"

      - name: Update DIRECT_DATABASE_URL
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CONNECTION_STRING: ${{ inputs.new_connection_string }}
        run: gh secret set DIRECT_DATABASE_URL --body "$CONNECTION_STRING"

      - name: Update STAGING_DATABASE_URL
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CONNECTION_STRING: ${{ inputs.new_connection_string }}
        run: gh secret set STAGING_DATABASE_URL --body "$CONNECTION_STRING"

      - name: Update TEST_DATABASE_URL
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CONNECTION_STRING: ${{ inputs.new_connection_string }}
        run: gh secret set TEST_DATABASE_URL --body "$CONNECTION_STRING"

      - name: Verify secrets updated
        run: echo "✅ All GitHub repository secrets updated"

  update-vercel-production:
    name: Update Vercel Production Environment
    runs-on: ubuntu-latest
    needs: validate
    if: inputs.environment == 'all' || inputs.environment == 'vercel-only'
    steps:
      - name: Update DATABASE_URL
        env:
          CONNECTION_STRING: ${{ inputs.new_connection_string }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          jq -n \
            --arg key DATABASE_URL \
            --arg value "$CONNECTION_STRING" \
            '{key: $key, value: $value, type: "encrypted", target: ["production", "preview"]}' | \
          curl -X POST "https://api.vercel.com/v10/projects/$PROJECT_ID/env" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            -d @-

      - name: Update DIRECT_DATABASE_URL
        env:
          CONNECTION_STRING: ${{ inputs.new_connection_string }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          jq -n \
            --arg key DIRECT_DATABASE_URL \
            --arg value "$CONNECTION_STRING" \
            '{key: $key, value: $value, type: "encrypted", target: ["production", "preview"]}' | \
          curl -X POST "https://api.vercel.com/v10/projects/$PROJECT_ID/env" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            -d @-

      - name: Update STAGING_DATABASE_URL
        env:
          CONNECTION_STRING: ${{ inputs.new_connection_string }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          jq -n \
            --arg key STAGING_DATABASE_URL \
            --arg value "$CONNECTION_STRING" \
            '{key: $key, value: $value, type: "encrypted", target: ["production", "preview"]}' | \
          curl -X POST "https://api.vercel.com/v10/projects/$PROJECT_ID/env" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            -d @-

      - name: Update TEST_DATABASE_URL
        env:
          CONNECTION_STRING: ${{ inputs.new_connection_string }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          jq -n \
            --arg key TEST_DATABASE_URL \
            --arg value "$CONNECTION_STRING" \
            '{key: $key, value: $value, type: "encrypted", target: ["production", "preview"]}' | \
          curl -X POST "https://api.vercel.com/v10/projects/$PROJECT_ID/env" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            -d @-

      - name: Verify production environment updated
        run: echo "✅ All Vercel production environment variables updated"

  update-vercel-staging:
    name: Update Vercel Staging Environment
    runs-on: ubuntu-latest
    needs: validate
    if: inputs.environment == 'all' || inputs.environment == 'vercel-only'
    steps:
      - name: Update DATABASE_URL
        env:
          CONNECTION_STRING: ${{ inputs.new_connection_string }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_STAGING }}
        run: |
          jq -n \
            --arg key DATABASE_URL \
            --arg value "$CONNECTION_STRING" \
            '{key: $key, value: $value, type: "encrypted", target: ["production", "preview"]}' | \
          curl -X POST "https://api.vercel.com/v10/projects/$PROJECT_ID/env" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            -d @-

      - name: Update DIRECT_DATABASE_URL
        env:
          CONNECTION_STRING: ${{ inputs.new_connection_string }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_STAGING }}
        run: |
          jq -n \
            --arg key DIRECT_DATABASE_URL \
            --arg value "$CONNECTION_STRING" \
            '{key: $key, value: $value, type: "encrypted", target: ["production", "preview"]}' | \
          curl -X POST "https://api.vercel.com/v10/projects/$PROJECT_ID/env" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            -d @-

      - name: Update STAGING_DATABASE_URL
        env:
          CONNECTION_STRING: ${{ inputs.new_connection_string }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_STAGING }}
        run: |
          jq -n \
            --arg key STAGING_DATABASE_URL \
            --arg value "$CONNECTION_STRING" \
            '{key: $key, value: $value, type: "encrypted", target: ["production", "preview"]}' | \
          curl -X POST "https://api.vercel.com/v10/projects/$PROJECT_ID/env" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            -d @-

      - name: Update TEST_DATABASE_URL
        env:
          CONNECTION_STRING: ${{ inputs.new_connection_string }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_STAGING }}
        run: |
          jq -n \
            --arg key TEST_DATABASE_URL \
            --arg value "$CONNECTION_STRING" \
            '{key: $key, value: $value, type: "encrypted", target: ["production", "preview"]}' | \
          curl -X POST "https://api.vercel.com/v10/projects/$PROJECT_ID/env" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            -d @-

      - name: Verify staging environment updated
        run: echo "✅ All Vercel staging environment variables updated"
