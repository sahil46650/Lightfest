name: Test Deploy with Approval Gate

on:
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: [self-hosted, Linux, X64]
    steps:
      - name: Build
        run: echo "Build"

  test:
    name: Test
    runs-on: [self-hosted, Linux, X64]
    needs: build
    steps:
      - name: Test
        run: echo "Test"

  approval:
    name: Approval Gate
    runs-on: ubuntu-latest
    needs: test
    environment:
      name: production-approval
    steps:
      - name: Waiting
        run: echo "Waiting for approval"

  deploy:
    name: Deploy
    runs-on: [self-hosted, Linux, X64]
    needs: approval
    environment:
      name: production
    steps:
      - name: Deploy
        run: echo "Deploy"
